<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#28AB83;--dark:#323547;--white:#fff;--light-green:#E5F5F0;--off-white:#F7FAF9;--border:#E0E5E3;--muted:#6B7280}
    body{font-family:'Lato',sans-serif;background:var(--off-white);color:var(--dark);min-height:100vh}
    .header{background:var(--dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .header .logo{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--green);letter-spacing:0.1em;text-transform:uppercase}
    .header .badge{background:rgba(40,171,131,0.2);color:var(--green);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
    .container{max-width:800px;margin:0 auto;padding:40px 24px 80px}
    .meta-header{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:28px}
    .meta-title{font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:10px}
    .meta-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .pill{background:var(--off-white);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--muted)}
    .pill.green{background:var(--light-green);color:var(--green);border-color:var(--green)}
    .meta-desc{font-size:13px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
    .blog-body{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:32px 40px;margin-bottom:24px;font-size:15px;line-height:1.8;color:var(--dark)}
    .blog-body h1{font-family:'Poppins',sans-serif;font-size:26px;font-weight:700;margin:20px 0 12px;line-height:1.3}
    .blog-body h2{font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;margin:28px 0 10px;line-height:1.3}
    .blog-body h3{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin:20px 0 8px}
    .blog-body p{margin-bottom:14px}
    .blog-body ul{margin:8px 0 14px 22px}
    .blog-body li{margin-bottom:6px}
    .image-marker{background:var(--light-green);border:1px dashed var(--green);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--green);font-style:italic;margin:16px 0}
    .image-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:3px}
    .faq-section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px 32px;margin-bottom:24px}
    .faq-section h2{font-family:'Poppins',sans-serif;font-size:18px;font-weight:600;margin-bottom:16px}
    .faq-item{border-bottom:1px solid var(--border);padding:14px 0}
    .faq-item:last-child{border-bottom:none}
    .faq-q{font-weight:700;font-size:14px;margin-bottom:6px}
    .faq-a{font-size:14px;color:var(--muted);line-height:1.6}
    .footer-note{text-align:center;font-size:13px;color:var(--muted);line-height:1.7;padding:20px}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:80px 24px;color:var(--muted);font-size:15px}
    .error{text-align:center;padding:60px 24px}
    .error .icon{font-size:40px;margin-bottom:12px}
    .error h2{font-family:'Poppins',sans-serif;font-size:18px;margin-bottom:8px}
    .error p{font-size:14px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Medical Marketing Whiz</div>
    <div class="badge">📄 Draft Preview</div>
  </div>
  <div class="container" id="app">
    <div class="loading"><div class="spinner"></div>Loading preview...</div>
  </div>
<script>
  const token = window.location.pathname.split('/blog-preview/')[1];

  async function init() {
    if (!token) { showError('Invalid preview link.'); return; }
    try {
      const res = await fetch('/api/blog-preview/' + token);
      if (!res.ok) throw new Error();
      const blog = await res.json();
      if (blog.error) throw new Error(blog.error);
      render(blog);
    } catch { showError('This preview link is invalid or has expired. Please reach out to your MMW contact for an updated link.'); }
  }

  function render(blog) {
    let html = '';

    // Meta header
    html += `<div class="meta-header">
      <div class="meta-title">${esc(blog.title_tag || blog.title)}</div>
      <div class="meta-pills">
        ${blog.target_keyword ? `<span class="pill green">🔑 ${esc(blog.target_keyword)}</span>` : ''}
        ${blog.word_count ? `<span class="pill">~${blog.word_count.toLocaleString()} words</span>` : ''}
        ${blog.slug ? `<span class="pill">/${esc(blog.slug)}</span>` : ''}
      </div>
      ${blog.meta_description ? `<div class="meta-desc"><strong>Meta description:</strong> ${esc(blog.meta_description)}</div>` : ''}
    </div>`;

    // Blog body
    html += `<div class="blog-body">${renderBody(blog.content)}</div>`;

    // FAQ
    if (blog.faq_json?.length) {
      html += `<div class="faq-section"><h2>Frequently Asked Questions</h2>
        ${blog.faq_json.map(f => `<div class="faq-item"><div class="faq-q">${esc(f.question)}</div><div class="faq-a">${esc(f.answer)}</div></div>`).join('')}
      </div>`;
    }

    html += `<div class="footer-note">This is a draft preview prepared by Medical Marketing Whiz. Please review the content and share any feedback with your MMW contact.</div>`;
    document.getElementById('app').innerHTML = html;
    document.title = `Preview: ${blog.title_tag || blog.title}`;
  }

  function renderBody(markdown) {
    if (!markdown) return '';
    const lines = markdown.split('\n'); let html = '', inUl = false;
    for (const line of lines) {
      const t = line.trim(), isBullet = t.startsWith('- ') || t.startsWith('* ');
      if (!isBullet && inUl) { html += '</ul>'; inUl = false; }
      if (!t) { html += '<br/>'; continue; }
      if (t.startsWith('# ')) html += `<h1>${esc(t.slice(2))}</h1>`;
      else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
      else if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
      else if (isBullet) { if (!inUl) { html += '<ul>'; inUl = true; } html += `<li>${esc(t.slice(2))}</li>`; }
      else if (t.startsWith('[Image:')) {
        // Parse [Image: desc | Alt: alt text]
        const inner = t.slice(7, -1);
        const parts = inner.split('|');
        const desc = parts[0]?.trim() || '';
        const alt = parts[1]?.replace(/^Alt:\s*/i,'').trim() || desc;
        html += `<div class="image-marker"><div class="image-label">Image Placement</div>${esc(desc)}${alt && alt !== desc ? `<br/><span style="font-size:12px;">Alt text: ${esc(alt)}</span>` : ''}</div>`;
      }
      else html += `<p>${esc(t).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')}</p>`;
    }
    if (inUl) html += '</ul>';
    return html;
  }

  function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error"><div class="icon">🔗</div><h2>Preview Not Found</h2><p>${esc(msg)}</p></div>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
