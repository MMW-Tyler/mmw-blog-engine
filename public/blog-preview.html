<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#28AB83;--dark:#323547;--white:#fff;--light-green:#E5F5F0;--off-white:#F7FAF9;--border:#E0E5E3;--muted:#6B7280;--warning:#F59E0B}
    body{font-family:'Lato',sans-serif;background:var(--off-white);color:var(--dark);min-height:100vh}
    .header{background:var(--dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .header .logo{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--green);letter-spacing:0.1em;text-transform:uppercase}
    .header .badge{background:rgba(40,171,131,0.2);color:var(--green);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
    .container{max-width:800px;margin:0 auto;padding:40px 24px 80px}
    .meta-header{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:28px}
    .meta-title{font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:10px}
    .meta-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .pill{background:var(--off-white);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--muted)}
    .pill.green{background:var(--light-green);color:var(--green);border-color:var(--green)}
    .meta-desc{font-size:13px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
    .blog-body{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:32px 40px;margin-bottom:24px;font-size:15px;line-height:1.8;color:var(--dark)}
    .blog-body h1{font-family:'Poppins',sans-serif;font-size:26px;font-weight:700;margin:20px 0 12px;line-height:1.3}
    .blog-body h2{font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;margin:28px 0 10px;line-height:1.3}
    .blog-body h3{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin:20px 0 8px}
    .blog-body p{margin-bottom:14px}
    .blog-body ul{margin:8px 0 14px 22px}
    .blog-body li{margin-bottom:6px}
    .image-marker{background:var(--light-green);border:1px dashed var(--green);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--green);font-style:italic;margin:16px 0}
    .image-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:3px}
    .faq-section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px 32px;margin-bottom:24px}
    .faq-section h2{font-family:'Poppins',sans-serif;font-size:18px;font-weight:600;margin-bottom:16px}
    .faq-item{border-bottom:1px solid var(--border);padding:14px 0}
    .faq-item:last-child{border-bottom:none}
    .faq-q{font-weight:700;font-size:14px;margin-bottom:6px}
    .faq-a{font-size:14px;color:var(--muted);line-height:1.6}
    /* FEEDBACK SECTION */
    .feedback-section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:24px}
    .feedback-section h2{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin-bottom:6px}
    .feedback-section p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6}
    .feedback-actions{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:'Lato',sans-serif;display:inline-flex;align-items:center;gap:8px}
    .btn-approve{background:var(--green);color:var(--white)}.btn-approve:hover{background:#22977A}
    .btn-feedback{background:var(--white);color:var(--dark);border:2px solid var(--border)}.btn-feedback:hover{border-color:var(--warning);color:#92400E}
    .btn-undo{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .feedback-form{display:none;margin-top:4px}
    .feedback-form textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:'Lato',sans-serif;font-size:14px;resize:vertical;min-height:100px;line-height:1.5}
    .feedback-form textarea:focus{outline:none;border-color:var(--warning)}
    .feedback-form-actions{display:flex;gap:10px;margin-top:10px}
    .btn-submit{background:var(--warning);color:var(--white);padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
    .btn-cancel{background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;padding:9px}
    .response-saved{border-radius:10px;padding:16px 18px;margin-top:4px}
    .response-saved.approved{background:var(--light-green);border:1px solid var(--green)}
    .response-saved.feedback-given{background:#FFFBEB;border:1px solid #FDE68A}
    .response-label{font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;margin-bottom:5px}
    .response-label.approved{color:var(--green)}
    .response-label.feedback-given{color:#92400E}
    .response-text{font-size:13px;color:var(--dark);line-height:1.5}
    .footer-note{text-align:center;font-size:13px;color:var(--muted);line-height:1.7;padding:20px}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:80px 24px;color:var(--muted);font-size:15px}
    .error{text-align:center;padding:60px 24px}
    .error .icon{font-size:40px;margin-bottom:12px}
    .error h2{font-family:'Poppins',sans-serif;font-size:18px;margin-bottom:8px}
    .error p{font-size:14px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Medical Marketing Whiz</div>
    <div class="badge">📄 Draft Preview</div>
  </div>
  <div class="container" id="app">
    <div class="loading"><div class="spinner"></div>Loading preview...</div>
  </div>
<script>
  const token = window.location.pathname.split('/blog-preview/')[1];
  let blog = null;
  let currentResponse = null; // { action: 'approved'|'feedback', feedback: '' }

  async function init() {
    if (!token) { showError('Invalid preview link.'); return; }
    try {
      const res = await fetch('/api/blog-preview/' + token);
      if (!res.ok) throw new Error();
      blog = await res.json();
      if (blog.error) throw new Error(blog.error);
      // Pre-populate existing response
      if (blog.client_blog_approved) currentResponse = { action: 'approved' };
      else if (blog.client_blog_feedback) currentResponse = { action: 'feedback', feedback: blog.client_blog_feedback };
      render();
    } catch { showError('This preview link is invalid or has expired. Please reach out to your MMW contact for an updated link.'); }
  }

  function render() {
    let html = '';

    // Meta header
    html += `<div class="meta-header">
      <div class="meta-title">${esc(blog.title_tag || blog.title)}</div>
      <div class="meta-pills">
        ${blog.target_keyword ? `<span class="pill green">🔑 ${esc(blog.target_keyword)}</span>` : ''}
        ${blog.word_count ? `<span class="pill">~${blog.word_count.toLocaleString()} words</span>` : ''}
        ${blog.slug ? `<span class="pill">/${esc(blog.slug)}</span>` : ''}
      </div>
      ${blog.meta_description ? `<div class="meta-desc"><strong>Meta description:</strong> ${esc(blog.meta_description)}</div>` : ''}
    </div>`;

    // Blog body
    html += `<div class="blog-body">${renderBody(blog.content)}</div>`;

    // FAQ
    if (blog.faq_json?.length) {
      html += `<div class="faq-section"><h2>Frequently Asked Questions</h2>
        ${blog.faq_json.map(f => `<div class="faq-item"><div class="faq-q">${esc(f.question)}</div><div class="faq-a">${esc(f.answer)}</div></div>`).join('')}
      </div>`;
    }

    // Feedback section
    html += `<div class="feedback-section">
      <h2>Your Feedback</h2>
      <p>Please let us know if this content looks good or if you'd like any changes. Your response goes directly to our team — no need to send an email.</p>
      ${renderFeedbackUI()}
    </div>`;

    html += `<div class="footer-note">This is a draft preview prepared by Medical Marketing Whiz. Your responses are saved automatically.</div>`;
    document.getElementById('app').innerHTML = html;
    document.title = `Preview: ${blog.title_tag || blog.title}`;
  }

  function renderFeedbackUI() {
    if (!currentResponse) {
      return `<div class="feedback-actions">
        <button class="btn btn-approve" onclick="submitApproval()">✓ Looks great — approve it</button>
        <button class="btn btn-feedback" onclick="showFeedbackForm()">💬 I have some feedback</button>
      </div>
      <div id="feedbackForm" class="feedback-form">
        <textarea id="feedbackText" placeholder="Let us know what you'd like changed or adjusted. Be as specific as you'd like — our team will review your notes and update accordingly."></textarea>
        <div class="feedback-form-actions">
          <button class="btn-submit" onclick="submitFeedback()">Submit Feedback</button>
          <button class="btn-cancel" onclick="hideFeedbackForm()">Cancel</button>
        </div>
      </div>`;
    }

    if (currentResponse.action === 'approved') {
      return `<div class="response-saved approved">
        <div class="response-label approved">✓ You approved this blog</div>
        <div class="response-text" style="color:var(--muted);font-size:12px;margin-top:3px;">Our team has been notified. If you'd like to change your response, click below.</div>
      </div>
      <button class="btn-undo" onclick="undoResponse()" style="margin-top:10px;">Change my response</button>`;
    }

    return `<div class="response-saved feedback-given">
      <div class="response-label feedback-given">💬 Your feedback has been submitted</div>
      <div class="response-text">${esc(currentResponse.feedback)}</div>
    </div>
    <button class="btn-undo" onclick="undoResponse()" style="margin-top:10px;">Edit my feedback</button>`;
  }

  function showFeedbackForm() {
    document.getElementById('feedbackForm').style.display = 'block';
    document.getElementById('feedbackText').focus();
  }

  function hideFeedbackForm() {
    document.getElementById('feedbackForm').style.display = 'none';
  }

  async function submitApproval() {
    try {
      await fetch(`/api/blog-preview/${token}/respond`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'approved' }) });
      currentResponse = { action: 'approved' };
      render();
    } catch { alert('Something went wrong — please try again.'); }
  }

  async function submitFeedback() {
    const feedback = document.getElementById('feedbackText').value.trim();
    if (!feedback) { alert('Please enter your feedback before submitting.'); return; }
    try {
      await fetch(`/api/blog-preview/${token}/respond`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'feedback', feedback }) });
      currentResponse = { action: 'feedback', feedback };
      render();
    } catch { alert('Something went wrong — please try again.'); }
  }

  async function undoResponse() {
    try {
      await fetch(`/api/blog-preview/${token}/respond`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'undo' }) });
      currentResponse = null;
      render();
    } catch { alert('Something went wrong — please try again.'); }
  }

  function renderBody(markdown) {
    if (!markdown) return '';
    const lines = markdown.split('\n'); let html = '', inUl = false;
    for (const line of lines) {
      const t = line.trim(), isBullet = t.startsWith('- ') || t.startsWith('* ');
      if (!isBullet && inUl) { html += '</ul>'; inUl = false; }
      if (!t) { html += '<br/>'; continue; }
      if (t.startsWith('# ')) html += `<h1>${esc(t.slice(2))}</h1>`;
      else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
      else if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
      else if (isBullet) { if (!inUl) { html += '<ul>'; inUl = true; } html += `<li>${esc(t.slice(2))}</li>`; }
      else if (t.startsWith('[Image:')) {
        const inner = t.slice(7, -1);
        const parts = inner.split('|');
        const desc = parts[0]?.trim() || '';
        const alt = parts[1]?.replace(/^Alt:\s*/i,'').trim() || desc;
        html += `<div class="image-marker"><div class="image-label">Image Placement</div>${esc(desc)}${alt && alt !== desc ? `<br/><span style="font-size:12px;">Alt text: ${esc(alt)}</span>` : ''}</div>`;
      }
      else html += `<p>${esc(t).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')}</p>`;
    }
    if (inUl) html += '</ul>';
    return html;
  }

  function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error"><div class="icon">🔗</div><h2>Preview Not Found</h2><p>${esc(msg)}</p></div>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
