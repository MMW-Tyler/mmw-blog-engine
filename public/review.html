<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Title Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #28AB83; --dark: #323547; --white: #fff; --light-green: #E5F5F0; --off-white: #F7FAF9; --border: #E0E5E3; --muted: #6B7280; }
    body { font-family: 'Lato', sans-serif; background: var(--off-white); color: var(--dark); min-height: 100vh; }
    .header { background: var(--dark); padding: 20px; text-align: center; }
    .header .logo { font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; }
    .header h1 { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); margin-top: 4px; }
    .container { max-width: 720px; margin: 0 auto; padding: 36px 20px; }
    .intro { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; margin-bottom: 24px; }
    .intro h2 { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .intro p { font-size: 14px; color: var(--muted); line-height: 1.7; }
    .count-badge { display: inline-block; background: var(--light-green); color: var(--green); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 12px; }
    .title-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 12px; }
    .title-num { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .title-text { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
    .title-kw { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .title-rationale { font-size: 13px; color: var(--muted); line-height: 1.5; font-style: italic; }
    .footer { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-top: 24px; text-align: center; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { text-align: center; padding: 80px 24px; color: var(--muted); font-size: 15px; }
    .error { text-align: center; padding: 60px 24px; }
    .error .icon { font-size: 40px; margin-bottom: 12px; }
    .error h2 { font-family: 'Poppins', sans-serif; font-size: 18px; margin-bottom: 8px; }
    .error p { font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Medical Marketing Whiz</div>
    <h1 id="pageTitle">Proposed Blog Topics</h1>
  </div>
  <div class="container">
    <div id="app"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>
<script>
  const token = window.location.pathname.split('/review/')[1];

  async function init() {
    if (!token) { showError('Invalid review link.'); return; }
    try {
      const res = await fetch('/api/review/' + token);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (data.clientName) document.getElementById('pageTitle').textContent = 'Proposed Blog Topics — ' + data.clientName;
      render(data.titles, data.clientName);
    } catch { showError('This link is invalid or has expired. Please contact your MMW team member for a new one.'); }
  }

  function render(titles, clientName) {
    if (!titles || !titles.length) { showError('No proposed titles found for this client.'); return; }
    document.getElementById('app').innerHTML = `
      <div class="intro">
        <h2>Here are your proposed blog topics${clientName ? ' for ' + esc(clientName) : ''}</h2>
        <p>Your team has put together the topics below for your upcoming blog schedule. Please review them and share any feedback directly with your MMW contact — let them know which you'd like to keep, swap out, or adjust.</p>
        <span class="count-badge">${titles.length} topic${titles.length !== 1 ? 's' : ''} proposed</span>
      </div>
      ${titles.map((t, i) => `
        <div class="title-card">
          <div class="title-num">Topic ${i + 1}</div>
          <div class="title-text">${esc(t.title)}</div>
          ${t.target_keyword ? `<div class="title-kw">Target keyword: ${esc(t.target_keyword)}</div>` : ''}
          ${t.rationale ? `<div class="title-rationale">${esc(t.rationale)}</div>` : ''}
        </div>`).join('')}
      <div class="footer">
        To approve, reject, or request changes to any of these topics, please reply directly to your MMW contact.<br />
        This page is view-only and will be updated as your team makes changes.
      </div>`;
  }

  function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error"><div class="icon">🔗</div><h2>Link Not Found</h2><p>${esc(msg)}</p></div>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
